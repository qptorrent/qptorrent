name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: qptorrent-linux-amd64
          - os: macos-latest
            artifact: qptorrent-macos-arm64
          - os: windows-latest
            artifact: qptorrent-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup V
        uses: vlang/setup-v@v1.4
        with:
          check-latest: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango1.0-dev libfontconfig1-dev libfribidi-dev libharfbuzz-dev libfreetype-dev libgl1-mesa-dri libxcursor-dev libxi-dev libxrandr-dev freeglut3-dev libdbus-1-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install pango harfbuzz freetype2

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install pango freetype

      - name: Install V dependencies
        run: v install gui

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: v -prod -o ${{ matrix.artifact }} .

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: v -prod -o ${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
